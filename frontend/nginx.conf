server {
    listen 80;
    server_name localhost;

    # Резолвим DNS при запросе, а не при старте (иначе nginx падает если бэкенд недоступен)
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Проксируем API-запросы к бэкенду на Render
    location /api/ {
        set $backend https://schedulesys-backend.onrender.com;
        proxy_pass $backend;
        proxy_set_header Host schedulesys-backend.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
