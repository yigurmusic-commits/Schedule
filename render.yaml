services:
  # Бэкенд на Python (FastAPI)
  - type: web
    name: schedulesys-backend
    env: docker
    dockerContext: backend
    dockerfilePath: ./backend/Dockerfile
    region: frankfurt
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: schedulesys-db
          property: internalConnectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_PASSWORD
        value: admin123
      - key: PORT
        value: 10000
      - key: CORS_ORIGINS
        value: https://schedulesys-frontend.onrender.com,http://localhost:5173,http://localhost:3000

  # Фронтенд на React (Vite) + Nginx
  - type: web
    name: schedulesys-frontend
    env: docker
    dockerContext: frontend
    dockerfilePath: ./frontend/Dockerfile
    region: frankfurt
    plan: free
    envVars:
      - key: PORT
        value: 80

databases:
  - name: schedulesys-db
    databaseName: schedulesys
    plan: free
    region: frankfurt
